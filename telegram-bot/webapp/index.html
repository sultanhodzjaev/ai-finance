<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI-Финансист</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Telegram WebApp SDK — первым, синхронно -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=20260527c">
</head>
<body class="min-h-screen" style="background:#f9fafb;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">

    <!-- Статический лоадер — виден сразу, до загрузки JS -->
    <div id="static-loader" style="display:flex;flex-direction:column;align-items:center;
         justify-content:center;min-height:100vh;gap:12px">
        <div style="width:48px;height:48px;border-radius:14px;background:#4f46e5;
                    display:flex;align-items:center;justify-content:center;color:#fff;
                    font-weight:700;font-size:20px;animation:pulse 1.5s ease-in-out infinite">AI</div>
        <p style="color:#9ca3af;font-size:14px;margin:0">Загружаю данные...</p>
    </div>
    <style>
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        /* Lucide-иконки наследуют размер от родителя */
        [data-lucide] { width:1em; height:1em; stroke-width:2; }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <div id="app" class="min-h-screen" style="display:none"></div>

    <!-- Tailwind, Chart.js, Lucide и app.js — в конце body, не блокируют рендер -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    <script src="app.js?v=20260527c"></script>
</body>
</html>
