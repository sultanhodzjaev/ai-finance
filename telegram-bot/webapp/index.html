<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI-Финансист</title>

    <!-- Telegram WebApp SDK — первым, синхронно -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen" style="background:#f9fafb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">

    <!-- Статический лоадер — виден сразу, до загрузки JS -->
    <div id="static-loader" style="display:flex;flex-direction:column;align-items:center;
         justify-content:center;min-height:100vh;gap:12px">
        <div style="font-size:48px;animation:pulse 1.5s ease-in-out infinite">💰</div>
        <p style="color:#9ca3af;font-size:14px;margin:0">Загружаю данные...</p>
    </div>
    <style>
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    </style>

    <div id="app" class="min-h-screen" style="display:none"></div>

    <!-- Tailwind, Chart.js и app.js — в конце body, не блокируют рендер -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
