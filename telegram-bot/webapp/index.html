<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI-Финансист</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Telegram WebApp SDK — первым, синхронно -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Тему определяем ДО рендера, чтобы не было flash светлой темы.
         Источник: Telegram colorScheme (если есть) либо системная prefers-color-scheme. -->
    <script>
        (function () {
            try {
                var tg = window.Telegram && window.Telegram.WebApp;
                var scheme = (tg && tg.colorScheme)
                    || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                if (scheme === 'dark') document.documentElement.classList.add('dark');
            } catch (e) {}
        })();
        // Tailwind CDN — переключаем dark variants через class на <html>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = { darkMode: 'class' };
    </script>

    <link rel="stylesheet" href="style.css?v=20260528d">
</head>
<body class="min-h-screen" style="font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">

    <!-- Статический лоадер — виден сразу, до загрузки JS -->
    <div id="static-loader" style="display:flex;flex-direction:column;align-items:center;
         justify-content:center;min-height:100vh;gap:12px">
        <div style="width:48px;height:48px;border-radius:14px;background:#7c3aed;
                    display:flex;align-items:center;justify-content:center;color:#fff;
                    font-weight:700;font-size:20px;animation:pulse 1.5s ease-in-out infinite">AI</div>
        <p style="color:var(--text-muted);font-size:13px;margin:0;letter-spacing:0.02em">Загружаю данные…</p>
    </div>
    <style>
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
        /* Lucide-иконки наследуют размер от родителя; stroke 1.5 = премиум-look */
        [data-lucide] { width:1em; height:1em; stroke-width:1.5; }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <div id="app" class="min-h-screen" style="display:none"></div>

    <!-- Tailwind, Chart.js, Lucide и app.js — в конце body, не блокируют рендер -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    <script src="app.js?v=20260528d"></script>
</body>
</html>
